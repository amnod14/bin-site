<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Important Question</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f7f7f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
text-align:center;
padding:20px;
max-width:500px;
width:100%;
}

img{
width:100%;
max-width:350px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.question{
margin-top:20px;
font-size:22px;
font-weight:bold;
padding:0 10px;
}

.buttons{
margin-top:25px;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

button{
padding:15px 28px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
min-width:110px;
}

.yes{
background:#4CAF50;
color:white;
}

.no{
background:#e74c3c;
color:white;
position:absolute;
}

.result{
display:none;
justify-content:center;
align-items:center;
height:100vh;
width:100%;
}

.result img{
width:90%;
max-width:450px;
}

</style>
</head>

<body>

<div class="container" id="mainContent">

<img src="IMG_0179.jpeg">

<div class="question">
Is Bin the cutest girl in the world?
</div>

<div class="buttons">
<button class="yes" id="yesBtn">Yes</button>
<button class="no" id="noBtn">No</button>
</div>

</div>

<div class="result" id="resultScreen">
<img src="IMG_2183.JPG">
</div>

<script>

const noBtn = document.getElementById("noBtn");

function moveButton(){
const padding = 80;

const x = Math.random() * (window.innerWidth - padding);
const y = Math.random() * (window.innerHeight - padding);

noBtn.style.left = x + "px";
noBtn.style.top = y + "px";
}

// run away on hover (desktop)
noBtn.addEventListener("mouseover", moveButton);

// run away on touch (mobile)
noBtn.addEventListener("touchstart", moveButton);

document.getElementById("yesBtn").onclick = function(){
document.getElementById("mainContent").style.display = "none";
document.getElementById("resultScreen").style.display = "flex";
};

</script>

</body>
</html>
